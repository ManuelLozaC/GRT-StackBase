services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: pj-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - pj-backend-vendor:/var/www/backend/vendor
      - pj-backend-storage:/var/www/backend/storage
    networks:
      - pj-network
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: pj-worker
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=120
    volumes:
      - ./backend:/var/www/backend
      - pj-backend-vendor:/var/www/backend/vendor
      - pj-backend-storage:/var/www/backend/storage
    networks:
      - pj-network
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  scheduler:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: pj-scheduler
    restart: unless-stopped
    working_dir: /var/www/backend
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www/backend
      - pj-backend-vendor:/var/www/backend/vendor
      - pj-backend-storage:/var/www/backend/storage
    networks:
      - pj-network
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    image: nginx:stable-alpine
    container_name: pj-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pj-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: mysql:8.0
    container_name: pj-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - pj-db-data:/var/lib/mysql
    networks:
      - pj-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${DB_PASSWORD} || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: pj-redis
    restart: unless-stopped
    networks:
      - pj-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  search:
    image: getmeili/meilisearch:latest
    container_name: pj-meili
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    ports:
      - "7700:7700"
    volumes:
      - pj-meili-data:/meili_data
    networks:
      - pj-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:7700/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    image: node:20-alpine
    container_name: pj-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - pj-frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - pj-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5173 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  pj-network:
    driver: bridge

volumes:
  pj-db-data:
  pj-meili-data:
  pj-backend-vendor:
  pj-backend-storage:
  pj-frontend-node-modules:
