services:
  # --- BACKEND (PHP 8.3 FPM) ---
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: pj-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    networks:
      - pj-network
    depends_on:
      - db
      - redis

  # --- SERVIDOR WEB (Nginx) ---
  web:
    image: nginx:stable-alpine
    container_name: pj-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pj-network

  # --- BASE DE DATOS (MySQL 8.0) ---
  db:
    image: mysql:8.0
    container_name: pj-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - pj-db-data:/var/lib/mysql
    networks:
      - pj-network

  # --- CACHÉ Y COLAS (Redis) ---
  redis:
    image: redis:alpine
    container_name: pj-redis
    restart: unless-stopped
    networks:
      - pj-network

  # --- BUSCADOR (Meilisearch) ---
  search:
    image: getmeili/meilisearch:latest
    container_name: pj-meili
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    ports:
      - "7700:7700"
    volumes:
      - pj-meili-data:/meili_data
    networks:
      - pj-network
      
# --- FRONTEND (Vue 3 + Vite) ---
  frontend:
    image: node:20-alpine
    container_name: pj-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - pj-network

networks:
  pj-network:
    driver: bridge

volumes:
  pj-db-data:
  pj-meili-data: